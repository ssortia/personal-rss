<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9F72F8"/>
      <stop offset="100%" stop-color="#5B1DB5"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!--
    Буква C: центр (32,32), радиус 18.
    Концы при ±45°: (44.7, 19.3) и (44.7, 44.7).
    sweep=0 + large-arc=1 → знак +1 в алгоритме SVG → центр (32,32) → дуга 270° через левую сторону = C.
    sweep=1 дало бы центр (57,32) и )-форму — это была ошибка в первой версии.
  -->
  <path d="M44.7 19.3 A18 18 0 1 0 44.7 44.7"
        stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Три точки по вертикальной оси — поток статей (центральная ярче) -->
  <circle cx="33" cy="24" r="2.3" fill="white" fill-opacity="0.50"/>
  <circle cx="33" cy="32" r="2.3" fill="white"/>
  <circle cx="33" cy="40" r="2.3" fill="white" fill-opacity="0.50"/>

  <!--
    4-конечная искра в проёме C — символ AI-отбора.
    Центр (50, 32). Внешний радиус: vert=4.5px, horiz=4px.
    Внутренний радиус: 1.3px (inner/outer ≈ 0.3) — острые лучи, не "+" и не ромб.
    Внутренние углы на 45° между лучами: (±0.92, ±0.92) от центра.
  -->
  <path d="M50 27.5 L50.92 31.08 L54 32 L50.92 32.92 L50 36.5 L49.08 32.92 L46 32 L49.08 31.08 Z"
        fill="white" fill-opacity="0.92"/>
</svg>